services:
  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=https://oekakinomori.com
      # - VITE_AUTH_REDIRECT_ENABLED=true # ログイン済みでログイン画面にアクセスしたらホームへリダイレクト

  backend:
    build: ./backend
    ports:
      - "5555:5555"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=postgresql://oekaki:password@db:5432/oekaki_db
      - FRONTEND_URL=https://oekakinomori.com
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=oekaki
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=oekaki_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
