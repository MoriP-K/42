services:
  mariadb:
    container_name: mariadb
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    volumes:
      - /home/kmoriyam/data/mysql:/var/lib/mysql
    networks:
      - inception-network
    env_file:
      - .env
    restart: unless-stopped
    expose:
      - "3306"

  wordpress:
    container_name: wordpress
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    volumes:
      - /home/kmoriyam/data/wordpress:/var/www/html
    networks:
      - inception-network
    env_file:
      - .env
    restart: unless-stopped
    expose:
      - "9000"
    depends_on:
      - mariadb

  nginx:
    container_name: nginx
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    volumes:
      - /home/kmoriyam/data/wordpress:/var/www/html
    networks:
      - inception-network
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "443:443"
    depends_on:
      - wordpress

networks:
  inception-network:
    driver: bridge